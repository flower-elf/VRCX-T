name: VRCX-0

on:
    - workflow_dispatch

concurrency:
    group: ${{ github.ref }}
    cancel-in-progress: true

permissions:
    contents: read

jobs:
    build:
        runs-on: windows-latest
        defaults:
            run:
                shell: bash
        steps:
            - uses: actions/checkout@v6

            - id: version
              run: |
                  version="$(cat Version)"
                  echo "version=${version}" >> "$GITHUB_OUTPUT"

            - name: Setup .NET 10
              uses: actions/setup-dotnet@v5
              with:
                  dotnet-version: '10.0.x'

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: lts/*
                  cache: npm

            - name: Set installer version
              run: echo "!define PRODUCT_VERSION_FROM_FILE \"${{ steps.version.outputs.version }}.0\"" > Installer/version_define.nsh

            - uses: actions/cache@v5
              with:
                  path: ~/.nuget/packages
                  key: ${{ runner.os }}-nuget-${{ hashFiles('Dotnet/VRCX-0.csproj') }}
                  restore-keys: ${{ runner.os }}-nuget-

            # ── Frontend ─────────────────────────────────────
            - name: Install npm dependencies
              run: npm ci

            - name: Build frontend
              run: npm run prod

            # ── .NET ─────────────────────────────────────────
            - name: Build .NET
              run: |
                  dotnet build Dotnet/VRCX-0.csproj \
                      -p:Configuration=Release \
                      -p:Platform=x64 \
                      -t:Restore,Build \
                      -m --self-contained

            # ── Package ──────────────────────────────────────
            - name: Install NSIS
              run: choco install nsis -y

            - name: Create installer
              uses: joncloud/makensis-action@v4
              with:
                  script-file: Installer/installer.nsi
                  additional-plugin-paths: Installer/Plugins

            - name: Rename installer
              run: mv Installer/VRCX-0_Setup.exe "VRCX-0_${{ steps.version.outputs.version }}_Setup.exe"

            - name: Create zip
              shell: pwsh
              run: |
                  $version = "${{ steps.version.outputs.version }}"
                  Get-ChildItem -Path build -Recurse -File |
                      Where-Object { $_.Extension -notin '.log','.pdb' } |
                      Compress-Archive -DestinationPath "VRCX-0_${version}.zip"

            # ── Upload ───────────────────────────────────────
            - name: Upload installer
              uses: actions/upload-artifact@v7
              with:
                  name: VRCX-0-Setup
                  path: VRCX-0_${{ steps.version.outputs.version }}_Setup.exe

            - name: Upload zip
              uses: actions/upload-artifact@v7
              with:
                  name: VRCX-0-Zip
                  path: VRCX-0_${{ steps.version.outputs.version }}.zip
